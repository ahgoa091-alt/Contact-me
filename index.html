<!doctype html>

    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        text-align: center;
        transition: 0.4s;
      }

      /* Card */
      .card {
        max-width: 420px;
        margin: 60px auto;
        padding: 25px;
      }

      /* Profile */
      .profile {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      }

      /* Social Buttons */
      .social a {
        display: block;
        margin: 14px auto;
        padding: 14px;
        width: 220px;
        border-radius: 30px;
        background: white;
        color: black;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }

      .social a:hover {
        transform: scale(1.07);
      }
    </style>
  </head>

    <div class="card">
